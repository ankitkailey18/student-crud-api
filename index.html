<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduManager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">
      <h1>EduManager</h1>
      <p>Student management system</p>
    </div>
    <div id="auth-alert"></div>
    <div class="tabs">
      <button class="active" onclick="switchTab('login')">Sign in</button>
      <button onclick="switchTab('register')">Register</button>
    </div>
    <div id="tab-login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign in</button>
    </div>
    <div id="tab-register" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="8+ chars, include a number"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create account</button>

      <div class="verify-box" id="verify-box">
        <div class="alert alert-info" style="margin-top:16px">
          Check your email for the verification token, then paste it below.
        </div>
        <div class="form-group" style="margin-top:8px">
          <label>Verification token</label>
          <input type="text" id="verify-token" placeholder="Paste token here"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="doVerify()">Verify email</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
